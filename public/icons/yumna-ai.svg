<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Yumna AI content robot avatar">
  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="#55a8c2"/>
  <!-- Antenna -->
  <line x1="32" y1="8" x2="32" y2="15" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="32" cy="7" r="3" fill="#ffd166"/>
  <!-- Ears -->
  <rect x="9" y="28" width="5" height="12" rx="2.5" fill="#ffffff"/>
  <rect x="50" y="28" width="5" height="12" rx="2.5" fill="#ffffff"/>
  <!-- Head -->
  <rect x="14" y="15" width="36" height="34" rx="11" fill="#ffffff"/>
  <!-- Face screen -->
  <rect x="18" y="20" width="28" height="24" rx="8" fill="#0e1517"/>
  <!-- Content (happy, closed) eyes -->
  <path d="M23 30 q3.5 -4.5 7 0" fill="none" stroke="#7ee8fa" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M34 30 q3.5 -4.5 7 0" fill="none" stroke="#7ee8fa" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Rosy cheeks -->
  <circle cx="23.5" cy="34.5" r="2" fill="#f7a6b9" opacity="0.85"/>
  <circle cx="40.5" cy="34.5" r="2" fill="#f7a6b9" opacity="0.85"/>
  <!-- Content smile -->
  <path d="M26 37 q6 5 12 0" fill="none" stroke="#7ee8fa" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Chin light -->
  <circle cx="32" cy="53" r="2.5" fill="#ffd166"/>
</svg>
